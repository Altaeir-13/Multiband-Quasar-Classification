project:
  seed: 42
  class_mapping:
    STAR: 0
    GALAXY: 1
    QSO: 2

paths:
  candidates_csv: data/raw/catalogs/sdss_dr17_candidates.csv
  metadata_csv: data/processed/image_sample/metadata.csv
  class_mapping_json: data/processed/image_sample/class_mapping.json
  image_root: data/raw/images
  reports_dir: reports/image_benchmark
  runs_dir: runs/image_benchmark

sdss:
  sql_endpoint: https://skyserver.sdss.org/dr17/SkyServerWS/SearchTools/SqlSearch
  imgcutout_endpoint: https://skyserver.sdss.org/dr17/SkyServerWS/ImgCutout/getjpeg
  classes: [STAR, GALAXY, QSO]
  candidate_rows_per_class: 10000
  science_primary: true
  zwarning_zero: true
  clean_photometry: true

sample:
  n_per_class: 2000
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15

cutouts:
  width: 128
  height: 128
  scale: 0.396
  opt: ""
  retries: 3
  timeout_seconds: 30
  request_sleep_seconds: 0.15

training:
  image_size: 128
  batch_size: 64
  epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.0001
  num_workers: 2
  patience: 5
  device: auto
  pretrained: false
  models: [simple_cnn, resnet18, densenet121]
